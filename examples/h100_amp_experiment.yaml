# Name: Esteban Montelongo
# Course: CSC 580 AI 2
# Assignment: Final Project — Dream the Road
# AI tools consulted: GitHub Copilot
#
# H100 + AMP (bfloat16) + FlashAdamW config.
# Maximises H100 throughput with:
#   - bf16 automatic mixed precision (native H100 tensor-core dtype)
#   - FlashAdamW fused optimizer (optional; falls back to AdamW)
#   - Large batch (256) to saturate GPU memory bandwidth
#   - 16 model/behavior updates per cycle to keep the GPU busy
#   - Aggressive offroad penalty (3.0) for driving stability
#   - DreamerV1-reference model dimensions (1024 embedding, 200+30 latent)
# Expected runtime: ~45-60 min on Colab H100 for 500 cycles.

seed: 7
device: cuda
env:
  env_id: highway-v0
  observation_height: 64
  observation_width: 64
  frame_stack: 1
  max_episode_steps: 100
  action:
    type: continuous
    longitudinal: true
    lateral: true
    longitudinal_scale: 1.0
    lateral_scale: 0.35
    smoothing_factor: 0.6
  reward:
    collision_reward: -1.0
    right_lane_reward: 0.1
    high_speed_reward: 0.4
    lane_change_reward: 0.0
    normalize_reward: true
    reward_speed_range: [20.0, 30.0]
    offroad_terminal: true
    offroad_penalty: 3.0
    steering_penalty: 0.05
    steering_change_penalty: 0.1
replay:
  capacity: 100000
  sequence_length: 32
  batch_size: 256
training:
  batch_size: 256
  imagination_horizon: 20
  world_model_lr: 0.0003
  actor_lr: 0.00008
  critic_lr: 0.00008
  kl_weight: 1.0
  free_nats: 3.0
  grad_clip_norm: 100.0
  lr_warmup_steps: 50
  use_amp: true
  amp_dtype: bfloat16
  use_flash_optimizer: true
  world_model_updates_per_cycle: 16
  behavior_updates_per_cycle: 16
  cycles: 2000
  warm_start_steps: 1000
  policy_steps: 64
  checkpoint_interval: 25
model:
  embedding_dim: 1024
  deterministic_dim: 200
  stochastic_dim: 30
  hidden_dim: 200
  rssm_num_layers: 2
  actor_hidden_dim: 200
  actor_num_layers: 2
  critic_hidden_dim: 200
  critic_num_layers: 3
  reward_hidden_dim: 200
  reward_num_layers: 2
