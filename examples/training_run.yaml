#
# Production training config for highway-v0 Tiny Dreamer.
# Use this config for real training runs on Colab (GPU recommended).
# Expected runtime: ~2-4 hours on Colab T4 for 500 cycles.

seed: 7
device: cuda
env:
  env_id: highway-v0
  observation_height: 64
  observation_width: 64
  frame_stack: 1
  max_episode_steps: 40
  action:
    type: continuous
    longitudinal: true
    lateral: true
    longitudinal_scale: 1.0
    lateral_scale: 0.35
    smoothing_factor: 0.6
  reward:
    collision_reward: -1.0
    right_lane_reward: 0.1
    high_speed_reward: 0.4
    lane_change_reward: 0.0
    normalize_reward: true
    reward_speed_range: [20.0, 30.0]
    offroad_terminal: true
    offroad_penalty: 3.0
    steering_penalty: 0.05
    steering_change_penalty: 0.1
replay:
  capacity: 50000
  sequence_length: 8
  batch_size: 32
training:
  batch_size: 32
  imagination_horizon: 15
  world_model_lr: 0.0003
  actor_lr: 0.00008
  critic_lr: 0.00008
  kl_weight: 1.0
  free_nats: 3.0
  world_model_updates_per_cycle: 2
  behavior_updates_per_cycle: 2
  cycles: 500
  warm_start_steps: 1000
  policy_steps: 32
  checkpoint_interval: 25
