# AI tools consulted: GitHub Copilot
#
# Optimized config for baseline-vs-optimized comparison.
# Changes over training_run.yaml:
#   - AdamW instead of Adam (better weight decay handling)
#   - Gradient clipping at 100.0 (prevents NaN from GRU unrolling)
#   - 50-step LR warm-up (stabilises early noisy gradients)
# Keeps the same seed, cycles, batch_size and horizon so the
# comparison isolates the effect of optimizer / stability changes.
# Uses DreamerV1-reference model dimensions.

seed: 7
device: cuda
env:
  env_id: highway-v0
  observation_height: 64
  observation_width: 64
  frame_stack: 1
  max_episode_steps: 40
  action:
    type: continuous
    longitudinal: true
    lateral: true
    longitudinal_scale: 1.0
    lateral_scale: 0.35
    smoothing_factor: 0.6
  reward:
    collision_reward: -1.0
    right_lane_reward: 0.1
    high_speed_reward: 0.4
    lane_change_reward: 0.0
    normalize_reward: true
    reward_speed_range: [20.0, 30.0]
    offroad_terminal: true
    offroad_penalty: 3.0
    steering_penalty: 0.05
    steering_change_penalty: 0.1
replay:
  capacity: 50000
  sequence_length: 32
  batch_size: 32
training:
  batch_size: 32
  imagination_horizon: 15
  world_model_lr: 0.0003
  actor_lr: 0.00008
  critic_lr: 0.00008
  kl_weight: 1.0
  free_nats: 3.0
  grad_clip_norm: 100.0
  lr_warmup_steps: 50
  world_model_updates_per_cycle: 2
  behavior_updates_per_cycle: 2
  cycles: 500
  warm_start_steps: 1000
  policy_steps: 32
  checkpoint_interval: 25
model:
  embedding_dim: 1024
  deterministic_dim: 200
  stochastic_dim: 30
  hidden_dim: 200
  rssm_num_layers: 2
  actor_hidden_dim: 200
  actor_num_layers: 2
  critic_hidden_dim: 200
  critic_num_layers: 3
  reward_hidden_dim: 200
  reward_num_layers: 2
