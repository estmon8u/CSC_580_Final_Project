# CPU smoke-test config. Uses small model dimensions for fast local testing.

seed: 7
device: cpu
env:
  env_id: highway-v0
  observation_height: 64
  observation_width: 64
  frame_stack: 1
  max_episode_steps: 40
  action:
    type: continuous
    longitudinal: true
    lateral: true
    longitudinal_scale: 1.0
    lateral_scale: 0.35
    smoothing_factor: 0.6
  reward:
    collision_reward: -1.0
    right_lane_reward: 0.1
    high_speed_reward: 0.4
    lane_change_reward: 0.0
    normalize_reward: true
    reward_speed_range: [20.0, 30.0]
    offroad_terminal: false
    offroad_penalty: 3.0
    steering_penalty: 0.05
    steering_change_penalty: 0.1
replay:
  capacity: 10000
  sequence_length: 8
  batch_size: 4
training:
  batch_size: 4
  imagination_horizon: 5
  discount: 0.99
  lambda_: 0.95
  overshooting_horizon: 2
  overshooting_kl_weight: 0.5
  world_model_lr: 0.0003
  actor_lr: 0.00008
  critic_lr: 0.00008
  kl_weight: 1.0
  free_nats: 3.0
  continue_loss_weight: 1.0
  world_model_updates_per_cycle: 1
  behavior_updates_per_cycle: 1
  cycles: 10
  warm_start_steps: 64
  policy_steps: 8
  checkpoint_interval: 5
evaluation:
  interval: 0
  episodes: 0
  max_steps: 200
model:
  embedding_dim: 256
  deterministic_dim: 128
  stochastic_dim: 32
  hidden_dim: 128
  rssm_num_layers: 1
  rssm_min_std: 0.1
  actor_hidden_dim: 64
  actor_num_layers: 1
  actor_init_std: 5.0
  actor_mean_scale: 5.0
  actor_min_std: 0.0001
  critic_hidden_dim: 64
  critic_num_layers: 1
  critic_distribution_std: 1.0
  observation_distribution_std: 1.0
  reward_hidden_dim: 64
  reward_num_layers: 1
  reward_distribution_std: 1.0
  use_continue_model: true
  continue_hidden_dim: 64
  continue_num_layers: 1
