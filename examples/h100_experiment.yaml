#
# H100-oriented Colab config.
# Use this only after the sanity run succeeds and a smaller real baseline is stable.

seed: 7
device: cuda
env:
  env_id: highway-v0
  observation_height: 64
  observation_width: 64
  frame_stack: 1
  max_episode_steps: 40
  action:
    type: continuous
    longitudinal: true
    lateral: true
    longitudinal_scale: 1.0
    lateral_scale: 0.35
    smoothing_factor: 0.6
replay:
  capacity: 100000
  sequence_length: 8
  batch_size: 128
training:
  batch_size: 128
  imagination_horizon: 20
  world_model_lr: 0.0003
  actor_lr: 0.00008
  critic_lr: 0.00008
  kl_weight: 1.0
  free_nats: 3.0
  world_model_updates_per_cycle: 8
  behavior_updates_per_cycle: 8
  cycles: 500
  warm_start_steps: 2000
  policy_steps: 64
  checkpoint_interval: 25
